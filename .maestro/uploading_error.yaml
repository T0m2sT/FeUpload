    timeout: 20000
- tapOn: Laboratório de Computadores
- tapOn: Exames
- tapOn: Enviar
- tapOn:
    text: Enviar material
    index: 1
- assertVisible: Por favor indica um título.
- tapOn: "ex: Exame 2023 – 1ª Época"
- inputText: Exame 123
- assertVisible: Exame 123
- tapOn: Back
- tapOn:
    text: Enviar material
    index: 1
- assertVisible: Por favor seleciona uma cadeira.
- tapOn: Selecionar cadeira
- tapOn: ALGA Álgebra Linear e Geometria Analítica
- assertVisible: ALGA – Álgebra Linear e Geometria Analítica
- tapOn: Selecionar ano letivo
- tapOn: 2025/2026
